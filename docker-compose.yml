version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: meetext_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://meetext:meetext@postgres:5432/meetext?sslmode=disable
      REDIS_ADDR: redis:6379
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: meetext_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: meetext_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetext
      POSTGRES_PASSWORD: meetext
      POSTGRES_DB: meetext
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetext"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: meetext_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
  uploads:
